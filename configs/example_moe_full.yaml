version: "0.1"

run:
  name: mixtral_like_moe_h100_zero2
  description: MoE full fine-tuning example for schema and backend pass-through

model:
  name: mixtral-like-8x7b
  architecture: moe
  total_params_b: 46.7
  active_params_b: 12.9
  num_layers: 32
  hidden_size: 4096
  num_attention_heads: 32
  vocab_size: 32000
  seq_len: 4096
  moe:
    num_experts: 8
    experts_per_token: 2
    expert_parallel_size: 1

training:
  mode: full
  precision: bf16
  optimizer: adamw
  micro_batch_size: 1
  gradient_accumulation_steps: 8
  global_batch_size: 64
  epochs: 1
  total_tokens_b: 1
  activation_checkpointing: 2

peft:
  enabled: false
  method: null
  trainable_params_b: null
  lora_rank: null
  lora_alpha: null
  target_modules: null

parallelism:
  num_gpus: 8
  tensor_parallel_size: 1
  pipeline_parallel_size: 1
  data_parallel_size: 8
  expert_parallel_size: 1
  sequence_parallel: false

deepspeed:
  enabled: true
  zero_stage: 2
  offload_optimizer: none
  offload_param: none

hardware:
  profile: h100_80g_8gpu
  gpu_type: H100-80G
  gpu_count: 8
  gpu_memory_gb: 80
  flops_efficiency: 0.35
  memory_efficiency: 0.90

cost:
  price_profile: h100_80g_8gpu
